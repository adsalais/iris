<section id="{{ panel_id }}-subtab">
  <h3>Databases</h3>
  <table>
    <thead><tr><th>Name</th><th>Admins</th><th>Writers</th><th>Readers</th><th></th></tr></thead>
    <tbody>
      {% for db in databases %}
      <tr>
        <td>{{ db.name }}</td>
        <td>{{ db.admin_count }}</td>
        <td>{{ db.writer_count }}</td>
        <td>{{ db.reader_count }}</td>
        <td>
          <button data-on:click='@post("/api/tabs?feature=authorization&amp;intent=manage&amp;temporary=true&amp;from_tab=" + encodeURIComponent($active || "") + "&amp;params=" + encodeURIComponent(JSON.stringify({database: {{ db.name | tojson }}})))'>
            manage
          </button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
