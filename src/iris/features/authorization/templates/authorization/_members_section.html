<section id="{{ panel_id }}-members" class="iris-members-section">

  <div class="iris-members-tier">
    <h4>Admins</h4>
    <ul>
      {% for m in members.admin %}
      <li>{{ "group: " if m.kind == "role" else "" }}{{ m.name }}</li>
      {% endfor %}
    </ul>
  </div>
</section>
