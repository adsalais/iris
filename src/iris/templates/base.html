<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Iris{% endblock %}</title>
  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 42rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; color: #1a1a1a; }
    h1 { margin-bottom: 0.25rem; }
    section { border: 1px solid #ddd; border-radius: 8px; padding: 1rem 1.25rem; margin: 1.25rem 0; }
    section h2 { margin-top: 0; }
    button { padding: 0.4rem 0.85rem; cursor: pointer; margin-right: 0.25rem; }
    input { padding: 0.4rem 0.5rem; }
    code { background: #f4f4f4; padding: 0.05rem 0.3rem; border-radius: 3px; }
    #greeting:empty { display: none; }
    #greeting { margin-top: 0.75rem; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
