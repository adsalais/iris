services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: iris-keycloak
    command: start-dev --import-realm
    environment:
      # Bootstrap admin for the Keycloak admin console (http://localhost:8080/admin).
      # On first boot Keycloak creates this user with all admin rights.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # Allow HTTP (no TLS) and run as if served at http://localhost:8080.
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      # Realm definition: imported on first boot. Subsequent edits in the
      # admin console persist to the data volume below, NOT to this file —
      # treat realm.json as the seed, not the source of truth after first run.
      - ./keycloak/realm.json:/opt/keycloak/data/import/iris-realm.json:ro
      # Persistent storage: H2 database with users, groups, clients, sessions.
      # Survives container restarts and `docker compose down`.
      - ${DATA_DIR:-${HOME}/.iris-data}/keycloak:/opt/keycloak/data
    # No healthcheck: the Keycloak image lacks curl/wget, and probing
    # /dev/tcp via bash isn't portable across Quarkus image revisions.
    # Realm import takes ~20-30s on first boot — watch the logs:
    #   docker compose logs -f keycloak
    # Ready when you see: "Listening on: http://0.0.0.0:8080".

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: iris-clickhouse
    environment:
      # iris_admin is provisioned via the init SQL below, NOT via CLICKHOUSE_USER.
      # The env-var path puts the user in `users_xml` access storage which is
      # read-only at runtime — and iris's per-login provisioning needs to issue
      # `GRANT IMPERSONATE ON <user> TO iris_admin`, which mutates iris_admin
      # and would fail with code 495 (ACCESS_STORAGE_READONLY).
      CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: "1"
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native protocol (clickhouse-client)
    volumes:
      # Init scripts run on every container start (because of
      # CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS above) — the SQL is idempotent.
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      # Elevates the `default` user so the init SQL can grant ALL + named
      # collection privileges to iris_admin. See file header for details.
      # Mounted as a single file (not the parent dir) so the entrypoint
      # can still write into users.d/ if it wants to.
      - ./clickhouse/users.d/iris-overlay.xml:/etc/clickhouse-server/users.d/iris-overlay.xml:ro
      - ${DATA_DIR:-${HOME}/.iris-data}/clickhouse/data:/var/lib/clickhouse
      - ${DATA_DIR:-${HOME}/.iris-data}/clickhouse/logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # clickhouse-client is always present in the official image.
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
